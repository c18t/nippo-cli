# generated by octocov init
coverage:
  if: true
  badge:
    path: badges/coverage.svg
  exclude:
    - 'nippo/nippo.go'
    - 'internal/adapter/presenter/view/tui/**'
    - 'internal/adapter/presenter/view/tui/*.go'
codeToTestRatio:
  if: true
  badge:
    path: badges/ratio.svg
  code:
    - '**/*.go'
    - '!**/*_test.go'
    - '!nippo/nippo.go'
    - '!internal/adapter/presenter/view/tui/**'
  test:
    - '**/*_test.go'
testExecutionTime:
  if: true
  badge:
    path: badges/time.svg
diff:
  datastores:
    - artifact://${GITHUB_REPOSITORY}
comment:
  # dependabot 起動時は GITHUB_TOKEN が読み取り専用でコメント投稿が 403 になるためスキップ
  if: is_pull_request && env.GITHUB_ACTOR != 'dependabot[bot]'
summary:
  if: true
report:
  datastores:
    - artifact://${GITHUB_REPOSITORY}
push:
  # dependabot 起動時は読み取り専用トークンで push できず exit 1 になるためスキップ
  if: env.GITHUB_ACTOR != 'dependabot[bot]'
  message: 'chore(ci): update by octocov'
